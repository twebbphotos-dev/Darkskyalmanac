<!-- ════════════════════════════════════════════════════════════
     ZION LUNAR ATLAS · PRO
     Moon-specialized companion to the Dark Sky Almanac.
     Self-contained Squarespace embed (paste into a Code block).
     Sections:  1 CSS   2 MARKUP   3 DATA   4 ASTRO/PROJECTION
                5 ICONS   6 RENDER   7 DETAIL   8 INIT
     Reuses the gold-foil theme + moonSVG renderer from the
     Dark Sky Almanac reference build.
     ════════════════════════════════════════════════════════════ -->

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<!-- ─────────────────────────  1 · CSS  ───────────────────────── -->
<style>
#zcl-moon-wrap{position:relative;width:100%;max-width:100%;margin:0 auto;
  background:#141319;font-family:'Montserrat',-apple-system,sans-serif;box-sizing:border-box}
@media(max-width:640px){
  #zcl-moon-wrap{width:100vw;max-width:100vw;margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw)}
}
#zcl-moon-wrap *{box-sizing:border-box}
#zcl-moon{width:100%;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%,rgba(72,68,86,.30),transparent 55%),
    radial-gradient(ellipse 100% 70% at 50% 110%,rgba(56,54,68,.26),transparent 55%),
    radial-gradient(circle at 50% 40%,#22212c 0%,#1a1922 55%,#141319 100%);
  border-top:1px solid rgba(203,168,90,.26);border-bottom:1px solid rgba(203,168,90,.26);
  box-shadow:inset 0 0 120px rgba(0,0,0,.5)}
#zcl-moon::after{content:'';position:absolute;inset:14px;border:1px solid rgba(203,168,90,.10);pointer-events:none;z-index:2}
#zcl-moon::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 45%,transparent 58%,rgba(0,0,0,.28) 100%)}
.zcl-m-goldbar{height:2px;background:linear-gradient(to right,transparent,rgba(203,168,90,.7) 30%,rgba(203,168,90,.7) 70%,transparent)}
#zcl-m-stars{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.5}
.zcl-m-fl{position:absolute;width:40px;height:40px;z-index:3;pointer-events:none;opacity:.58}
.zcl-m-fl svg{width:100%;height:100%}
.zcl-m-tl{top:14px;left:14px}.zcl-m-tr{top:14px;right:14px;transform:scaleX(-1)}
.zcl-m-bl{bottom:14px;left:14px;transform:scaleY(-1)}.zcl-m-br{bottom:14px;right:14px;transform:scale(-1,-1)}
.zcl-m-inner{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 22px 26px}

/* Title banner */
.zcl-m-titlebar{text-align:center;padding:30px 24px 16px}
.zcl-m-maintitle{font-size:clamp(22px,3.4vw,34px);font-weight:600;letter-spacing:.06em;color:#F2E4BE;
  text-transform:uppercase;line-height:1.2;text-shadow:0 0 24px rgba(203,168,90,.22)}
.zcl-m-titlerule{display:flex;align-items:center;justify-content:center;gap:14px;margin:13px auto 11px;max-width:340px}
.zcl-m-rline{height:1px;flex:1;background:linear-gradient(to right,transparent,rgba(203,168,90,.55))}
.zcl-m-titlerule .zcl-m-rline:last-child{background:linear-gradient(to left,transparent,rgba(203,168,90,.55))}
.zcl-m-rstar{width:16px;height:16px;flex-shrink:0;opacity:.9;filter:drop-shadow(0 0 5px rgba(203,168,90,.5))}
.zcl-m-subtitle{font-size:13px;letter-spacing:.02em;color:#9A8E6E;max-width:520px;margin:0 auto}
@media(max-width:520px){.zcl-m-titlebar{padding:24px 16px 14px}.zcl-m-subtitle{font-size:12px}}

.zcl-m-seclabel{font-size:14px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#CBA85A;
  margin:0 0 10px;padding-bottom:7px;border-bottom:1px solid rgba(203,168,90,.22);display:flex;align-items:center;justify-content:space-between;gap:10px}

/* coming-nights phase strip */
.zcl-m-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.zcl-m-strip::-webkit-scrollbar{height:6px}.zcl-m-strip::-webkit-scrollbar-thumb{background:rgba(203,168,90,.3);border-radius:3px}
.zcl-m-night{flex:0 0 auto;width:50px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px 5px;
  border:1px solid rgba(203,168,90,.13);border-radius:7px;background:rgba(255,255,255,.013);cursor:pointer;
  transition:background .15s,border-color .15s}
.zcl-m-night:hover{background:rgba(203,168,90,.09);border-color:rgba(203,168,90,.3)}
.zcl-m-night.sel{background:rgba(203,168,90,.18);border-color:#CBA85A}
.zcl-m-night.today{border-color:rgba(203,168,90,.45)}
.zcl-m-ndow{font-size:8px;letter-spacing:.1em;color:#8A6E32;text-transform:uppercase}
.zcl-m-ndate{font-size:11px;color:#9A875C;line-height:1}
.zcl-m-night.sel .zcl-m-ndate{color:#E4D9B8}
.zcl-m-nglyph{line-height:0}

/* map */
.zcl-m-mapcard{position:relative;width:100%;max-width:560px;margin:0 auto;background:rgb(8,7,14);
  border:1px solid rgba(203,168,90,.18);border-radius:10px;padding:8px;overflow:hidden}
.zcl-m-stage{position:relative;width:100%;line-height:0}
.zcl-m-stage img{width:100%;height:auto;display:block;border-radius:6px;user-select:none;-webkit-user-drag:none}
.zcl-m-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.zcl-m-dot{cursor:pointer}
.zcl-m-hit{cursor:pointer}
.zcl-m-lbl{font-family:'Montserrat',sans-serif;font-weight:500;fill:#EBDFB8;
  paint-order:stroke;stroke:rgba(0,0,0,.72);stroke-width:5px;stroke-linejoin:round;pointer-events:none}
.zcl-m-orient{font-family:'Montserrat',sans-serif;font-size:20px;letter-spacing:.14em;
  fill:#9A875C;text-transform:uppercase;paint-order:stroke;stroke:rgba(0,0,0,.6);stroke-width:4px}

/* control chips */
.zcl-m-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:12px 0 4px}
.zcl-m-chip{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8A7C5C;
  border:1px solid rgba(203,168,90,.28);border-radius:20px;padding:5px 13px;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,.18);transition:all .15s;user-select:none}
.zcl-m-chip:hover{border-color:rgba(203,168,90,.55)}
.zcl-m-chip .dotc{width:9px;height:9px;border-radius:50%;display:inline-block;opacity:.4;transition:opacity .15s}
.zcl-m-chip.on{color:#F2E4BE;border-color:#CBA85A;background:rgba(203,168,90,.12)}
.zcl-m-chip.on .dotc{opacity:1}

/* phase readout */
.zcl-m-readout{display:flex;align-items:center;gap:16px;margin:16px auto 0;max-width:560px;
  background:#0d0a18;border:1px solid rgba(203,168,90,.18);border-radius:10px;padding:14px 16px}
.zcl-m-rglyph{flex-shrink:0;line-height:0}
.zcl-m-rmeta{flex:1;min-width:0}
.zcl-m-rdate{font-size:12px;letter-spacing:.06em;color:#8A6E32;text-transform:uppercase}
.zcl-m-rphase{font-size:19px;color:#CBA85A;letter-spacing:.03em;margin:2px 0}
.zcl-m-rill{font-size:13px;color:#9A875C}
.zcl-m-rmoon{font-size:12.5px;color:#C9BD97;margin-top:7px;letter-spacing:.02em;display:flex;flex-wrap:wrap;gap:4px 16px}
.zcl-m-rmoon span{display:inline-flex;align-items:center;gap:6px}
.zcl-m-rmoon i{color:#CBA85A;font-style:normal;font-size:14px;line-height:1}
.zcl-m-rmoon b{color:#E4D9B8;font-weight:500}
.zcl-m-rterm{font-size:12.5px;color:#9DB6CC;margin-top:7px;line-height:1.45}
.zcl-m-rterm b{color:#C9D8E8;font-weight:500;font-style:normal}
.zcl-m-daynav{display:flex;gap:8px;flex-shrink:0}
.zcl-m-daybtn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(203,168,90,.35);background:none;
  color:#CBA85A;font-size:21px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;padding:0}
.zcl-m-daybtn:hover{background:rgba(203,168,90,.12);border-color:#CBA85A}
.zcl-m-daybtn:active{transform:scale(.94)}

/* detail panel */
.zcl-m-detail{max-width:560px;margin:12px auto 0;background:#0d0a18;border:1px solid rgba(203,168,90,.18);
  border-radius:10px;padding:0;overflow:hidden;max-height:0;opacity:0;transition:max-height .28s ease,opacity .28s ease,padding .28s ease}
.zcl-m-detail.open{max-height:480px;opacity:1;padding:14px 16px;overflow-y:auto}
.zcl-m-dtype{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8A6E32}
.zcl-m-dname{font-size:18px;color:#E4D9B8;letter-spacing:.02em;margin:3px 0 7px;display:flex;align-items:center;gap:9px}
.zcl-m-dname i{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.zcl-m-dbody{font-size:13.5px;line-height:1.6;color:#C9BD97}
.zcl-m-dcoord{font-size:11.5px;color:#7A6E55;margin-top:9px}
.zcl-m-dlit{font-size:12px;margin-top:6px}

.zcl-m-note{font-size:11px;color:#6E6450;text-align:center;margin:16px auto 0;max-width:540px;line-height:1.5}

@media(max-width:520px){
  .zcl-m-inner{padding:0 12px 20px}
  .zcl-m-readout{flex-wrap:wrap;gap:12px}
  .zcl-m-daynav{order:3;width:100%;justify-content:center}
  .zcl-m-lbl{stroke-width:6px}
}
</style>

<!-- ────────────────────────  2 · MARKUP  ──────────────────────── -->
<div id="zcl-moon-wrap">
<div id="zcl-moon">
  <div class="zcl-m-goldbar"></div>
  <div class="zcl-m-fl zcl-m-tl"></div><div class="zcl-m-fl zcl-m-tr"></div>
  <div class="zcl-m-fl zcl-m-bl"></div><div class="zcl-m-fl zcl-m-br"></div>
  <svg id="zcl-m-stars" viewBox="0 0 800 700" preserveAspectRatio="xMidYMid slice"></svg>
  <div class="zcl-m-titlebar">
    <div class="zcl-m-maintitle">Lunar Atlas</div>
    <div class="zcl-m-titlerule">
      <span class="zcl-m-rline"></span>
      <svg class="zcl-m-rstar" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L13.6 9.2 L21 12 L13.6 14.8 L12 22 L10.4 14.8 L3 12 L10.4 9.2 Z" fill="#CBA85A"/></svg>
      <span class="zcl-m-rline"></span>
    </div>
  </div>
  <div class="zcl-m-inner">

    <div class="zcl-m-strip" id="zcl-m-strip"></div>

    <div class="zcl-m-chips" id="zcl-m-chips">
      <span class="zcl-m-chip" data-cat="sea"><i class="dotc" style="background:#6FA0CC"></i>Seas</span>
      <span class="zcl-m-chip on" data-cat="crater"><i class="dotc" style="background:#D8B45A"></i>Craters &amp; peaks</span>
      <span class="zcl-m-chip" data-cat="apollo"><i class="dotc" style="background:#7FD08A"></i>Apollo sites</span>
      <span class="zcl-m-chip on" data-cat="term"><i class="dotc" style="background:#E8C24A"></i>Terminator</span>
    </div>

    <div class="zcl-m-mapcard">
      <div class="zcl-m-stage">
        <img id="zcl-m-img" alt="The moon" src="img/moon.jpg">
        <svg class="zcl-m-svg" id="zcl-m-svg" viewBox="0 0 1120 1064" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <div class="zcl-m-detail" id="zcl-m-detail"></div>

    <div class="zcl-m-readout">
      <div class="zcl-m-rglyph" id="zcl-m-rglyph"></div>
      <div class="zcl-m-rmeta">
        <div class="zcl-m-rdate" id="zcl-m-rdate"></div>
        <div class="zcl-m-rphase" id="zcl-m-rphase"></div>
        <div class="zcl-m-rill" id="zcl-m-rill"></div>
        <div class="zcl-m-rmoon" id="zcl-m-rmoon"></div>
        <div class="zcl-m-rterm" id="zcl-m-rterm"></div>
      </div>
      <div class="zcl-m-daynav">
        <button class="zcl-m-daybtn" id="zcl-m-prev" aria-label="Previous night">&#8249;</button>
        <button class="zcl-m-daybtn" id="zcl-m-next" aria-label="Next night">&#8250;</button>
      </div>
    </div>

    <div class="zcl-m-note">Tap any label for details. The shaded edge is the terminator — the line of lunar sunrise or sunset — where craters cast their longest shadows and detail is sharpest in a telescope.</div>

  </div>
</div>
</div>

<script>
"use strict";
(function(){

// ════════════════════  3 · DATA & CONSTANTS  ════════════════════
const SYNODIC = 29.53058867;
const REF_NEW_MOON = new Date('2000-01-06T18:14:00Z');
const LAT = 37.1986, LNG = -112.9869;          // Zion (for moonrise/set if needed)
const TZ  = 'America/Denver';                   // Mountain Time, for moonrise/set display
const MO  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Calibration of the embedded moon photo, solved from anchor craters:
// disc fitted to the limb; libration + position-angle fitted to nine
// craters spanning the whole disc (Tycho, Copernicus, Aristarchus, Plato,
// Theophilus, Proclus, Langrenus, Posidonius, Plinius) — max error ~12px,
// about 1.2% of the disc radius, balanced east-to-west.
const IMG_W = 1120, IMG_H = 1064;
const CAL = { cx:0.5042, cy:0.5079, r:0.4145, libLon:-3.26, libLat:-6.16, pa:11.05 };
const CX = CAL.cx*IMG_W, CY = CAL.cy*IMG_H, R = CAL.r*IMG_W;
const D2R = Math.PI/180;

const CATCOL = { sea:'#6FA0CC', crater:'#D8B45A', apollo:'#7FD08A' };
const CATNAME = { sea:'Lunar sea', crater:'Crater / range', apollo:'Apollo landing site' };

// Features with selenographic coordinates (lon East+, lat North+).
const FEATURES = [
  // ── seas ──
  {n:'Mare Crisium',lon:59,lat:17,t:'sea',d:'The Sea of Crises \u2014 an isolated dark oval near the eastern limb, about 345 miles across, filling an impact basin nearly 4 billion years old that later flooded with dark lava. Because it stands apart from the other seas, it is the first great plain to catch the rising sun each lunar morning. The robotic Luna 24 mission landed here in 1976 and returned soil to Earth.'},
  {n:'Mare Fecunditatis',lon:52,lat:-8,t:'sea',d:'The Sea of Fertility, a broad eastern plain roughly 560 miles wide. Luna 16 touched down here in 1970 \u2014 the first robotic craft to bring a lunar sample home. Look for the twin craters Messier and Messier A, whose comet-like double ray was flung westward by an impactor that struck at a very low, grazing angle.'},
  {n:'Mare Nectaris',lon:34,lat:-15,t:'sea',d:'The Sea of Nectar, a small circular sea whose formation around 3.9 billion years ago is used to define an entire chapter of lunar history \u2014 the Nectarian period. Its northwestern shore is guarded by the magnificent Theophilus\u2013Cyrillus\u2013Catharina crater chain.'},
  {n:'Mare Tranquillitatis',lon:30,lat:9,t:'sea',d:'The Sea of Tranquility \u2014 on 20 July 1969 Apollo 11 set down on its southwestern shore, and Neil Armstrong and Buzz Aldrin became the first humans to walk on another world. Spanning about 540 miles, its lava carries an unusually high titanium content that gives it a faint blue tint in colour photographs.'},
  {n:'Mare Serenitatis',lon:17,lat:28,t:'sea',d:'The Sea of Serenity, a smooth, nearly circular plain about 430 miles across, ringed by wrinkle ridges where the cooling lava buckled and compressed. Apollo 17 explored its rugged southeastern shore in 1972.'},
  {n:'Mare Vaporum',lon:4,lat:13,t:'sea',d:'The Sea of Vapors, a small plain at the southern foot of the Apennine Mountains, floored by some of the darkest, most ancient lava on the near side.'},
  {n:'Mare Frigoris',lon:0,lat:56,t:'sea',d:'The Sea of Cold \u2014 a long, narrow ribbon of lava arcing more than 1,000 miles across the far north. It is the one major sea that breaks the rule of being roughly circular, tracing instead the northern edge of the Imbrium basin.'},
  {n:'Mare Imbrium',lon:-16,lat:35,t:'sea',d:'The Sea of Showers, about 750 miles across \u2014 one of the largest impact basins in the entire solar system. The body that carved it nearly 3.9 billion years ago struck with such violence that it raised mountain ranges and flung debris clear across the near side. Lava later welled up to fill it smooth.'},
  {n:'Mare Nubium',lon:-15,lat:-21,t:'sea',d:'The Sea of Clouds, a dark southern plain. America\u2019s first soft landing came down here in 1966, when Surveyor 1 proved a spacecraft could settle on the surface without sinking into the dust \u2014 a key reassurance before Apollo.'},

  {n:'Sinus Iridum',lon:-32,lat:45,t:'sea',d:'The Bay of Rainbows, a half-circle of lava ringed by the curving Jura Mountains. For a night or two around first quarter, sunrise lights the mountain arc while the bay floor is still dark, and it juts into the blackness as the famous \u201CGolden Handle.\u201D'},

  {n:'Tycho',lon:-11,lat:-43,t:'crater',d:'The Moon\u2019s most famous young crater \u2014 about 53 miles wide and a mere 108 million years old, so recent that dinosaurs still walked the Earth when it formed. The impact threw out a brilliant system of rays, the longest reaching roughly 1,500 km \u2014 about 930 miles \u2014 across the surface, which dominate the face of the full moon. A sample of its ejecta returned by Apollo 17 is what gave us its age. Its central peak rises about 1.2 miles above the crater floor.'},
  {n:'Copernicus',lon:-20,lat:10,t:'crater',d:'The textbook impact crater \u2014 58 miles wide and around 800 million years old, with walls that slumped into broad concentric terraces, a cluster of central peaks, and a ray system spreading some 500 miles. Early astronomers debated whether such features were volcanic; Copernicus is now understood as the classic scar of a high-speed impact.'},
  {n:'Kepler',lon:-38,lat:8,t:'crater',d:'A small but dazzling crater just 20 miles across, wrapped in a bright halo of fresh ejecta. Its rays interlace with those of Copernicus across the dark lava of the Ocean of Storms.'},
  {n:'Aristarchus',lon:-47,lat:24,t:'crater',d:'The brightest large feature on the Moon \u2014 its young walls are about twice as reflective as the average lunar surface, bright enough to glimpse lit only by earthshine. Beside it winds Schr\u00F6ter\u2019s Valley, the Moon\u2019s largest sinuous rille, a channel carved by flowing lava over a billion years ago. The plateau is a long-standing hotspot for reports of \u201Ctransient lunar phenomena.\u201D'},
  {n:'Plato',lon:-9,lat:51,t:'crater',d:'A 68-mile crater on the northern shore of Mare Imbrium whose floor was flooded by dark lava, leaving it unusually smooth and slate-grey against the bright highlands around it. Generations of observers have hunted across its floor for the faint glows and mists occasionally reported there.'},
  {n:'Archimedes',lon:-4,lat:30,t:'crater',d:'The largest crater on Mare Imbrium, 51 miles across, its interior flooded perfectly flat by lava that buried any central peak. Apollo 15 landed just to its southeast, near the winding canyon of Hadley Rille.'},
  {n:'Grimaldi',lon:-68,lat:-5,t:'crater',d:'A vast, ancient walled plain near the western limb whose floor is one of the darkest patches on the whole Moon \u2014 dark enough to pick out even at full moon, when shadows vanish everywhere else.'},
  {n:'Gassendi',lon:-40,lat:-18,t:'crater',d:'A 68-mile crater perched on the northern rim of Mare Humorum. Its floor is fractured by a delicate web of rilles \u2014 cracks formed as lava pushed up beneath it \u2014 making it a rewarding high-magnification target.'},
  {n:'Clavius',lon:-14,lat:-58,t:'crater',d:'One of the largest craters on the near side at about 140 miles across \u2014 wide enough to swallow a small sea. A graceful arc of progressively smaller craters curves across its ancient, battered floor. Science-fiction readers know it as the site of the moonbase in 2001: A Space Odyssey.'},
  {n:'Theophilus',lon:26,lat:-11,t:'crater',d:'A magnificent crater 60 miles wide with sharply terraced walls and a cluster of central peaks rising about a mile high. It is the youngest and crispest of a three-crater chain on the shore of Mare Nectaris; its neighbours Cyrillus and Catharina are visibly older and more eroded \u2014 a timeline of bombardment laid out in a single eyepiece field.'},
  {n:'Posidonius',lon:30,lat:32,t:'crater',d:'A 59-mile crater flooded by lava on the northeastern edge of Mare Serenitatis. Its thin floor is cracked by an intricate network of rilles that reward patient high-power study.'},

  {n:'Petavius',lon:61,lat:-25,t:'crater',d:'A spectacular crater about 110 miles wide with a domed, fractured floor and a great rille running from its central mountains to the rim. It is best caught in the day or two after new moon, when low-angled sunlight throws its relief into dramatic shadow before it flattens out.'},

  {n:'Proclus',lon:47,lat:16,t:'crater',d:'A brilliant little crater just 17 miles wide on the western shore of Mare Crisium, throwing one of the Moon\u2019s most distinctive ray systems \u2014 a lopsided fan, because the impactor arrived at a low, grazing angle that swept its ejecta to one side.'},
  {n:'Montes Apenninus',lon:-3,lat:20,t:'crater',d:'The Moon\u2019s grandest mountain range, curving some 600 miles along the rim of Mare Imbrium with peaks rising up to 3 miles \u2014 raised in mere minutes by the colossal impact that carved the basin. Apollo 15 landed at their foot in 1971 and drove the first lunar rover along nearby Hadley Rille.'},
  // ── apollo ──

// ════════════════  4 · ASTRONOMY & PROJECTION  ════════════════
// Moon phase: illumination 0-1, waxing flag, and a matching name.
function moonPhase(date){
  // Evaluate at evening observing time (~22:00 local) rather than midnight,
  // so the phase shown matches what you actually see in the sky that night.
  const evening = new Date(date.getTime() + 22*3600*1000);
  const days=(evening-REF_NEW_MOON)/86400000;
  const ph=((days%SYNODIC)+SYNODIC)%SYNODIC;
  const frac=ph/SYNODIC;
  const ill=0.5*(1-Math.cos(2*Math.PI*frac));
  const waxing=frac<0.5;
  let name;
  if(ill<0.02)      name='New Moon';
  else if(ill>0.98) name='Full Moon';
  else if(ill<0.46) name=waxing?'Waxing Crescent':'Waning Crescent';
  else if(ill<0.54) name=waxing?'First Quarter':'Last Quarter';
  else              name=waxing?'Waxing Gibbous':'Waning Gibbous';
  return {ill,frac,waxing,name};
}

// Orthographic projection of selenographic (lon,lat) onto the photo,
// with the fitted libration (sub-observer point) and position angle.
function project(lon,lat){
  const lo=lon*D2R, la=lat*D2R, L0=CAL.libLon*D2R, B0=CAL.libLat*D2R, C=CAL.pa*D2R;
  const xs=Math.cos(la)*Math.sin(lo-L0);
  const ys=Math.cos(B0)*Math.sin(la)-Math.sin(B0)*Math.cos(la)*Math.cos(lo-L0);
  const zs=Math.sin(B0)*Math.sin(la)+Math.cos(B0)*Math.cos(la)*Math.cos(lo-L0);
  const X=xs*Math.cos(C)-ys*Math.sin(C), Y=xs*Math.sin(C)+ys*Math.cos(C);
  return {x:CX+R*X, y:CY-R*Y, vis:zs};   // vis>0 → on the near side
}
// Project any moon-fixed unit vector (used for the terminator / limb curves).
function projVec(v){
  const lat=Math.asin(Math.max(-1,Math.min(1,v[1])))/D2R;
  const lon=Math.atan2(v[0],v[2])/D2R;
  return project(lon,lat);
}
function cross(a,b){return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]]}
function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]}
function unit(a){const m=Math.hypot(a[0],a[1],a[2])||1;return [a[0]/m,a[1]/m,a[2]/m]}
function dist3(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1],a[2]-b[2])}

// Sub-solar longitude from illuminated fraction (waxing → sun over the east).
function subSolarLon(ill,waxing){
  const a=Math.acos(Math.max(-1,Math.min(1,2*ill-1)))/D2R;
  return waxing?a:-a;
}
// Sun direction in the moon-fixed frame for a given phase.
function sunDir(ill,waxing){
  const ls=subSolarLon(ill,waxing)*D2R;
  return [Math.sin(ls),0,Math.cos(ls)];
}
// Observer (sub-Earth) direction, with libration.
function obsDir(){
  const B0=CAL.libLat*D2R, L0=CAL.libLon*D2R;
  return [Math.cos(B0)*Math.sin(L0),Math.sin(B0),Math.cos(B0)*Math.cos(L0)];
}
// Extract the single contiguous run of a sampled loop that passes pred().
function extractRun(arr,pred){
  const n=arr.length, ok=arr.map(pred);
  if(ok.every(x=>x)) return arr.slice();
  if(ok.every(x=>!x)) return [];
  let start=-1;
  for(let i=0;i<n;i++){ if(ok[i]&&!ok[(i-1+n)%n]){start=i;break} }
  if(start<0) return arr.filter((_,i)=>ok[i]);
  const run=[];
  for(let j=0;j<n;j++){ const idx=(start+j)%n; if(ok[idx]) run.push(arr[idx]); else break }
  return run;
}
// Build the terminator polyline (visible arc) + the shadowed-region polygon.
function terminatorGeom(ill,waxing){
  const S=sunDir(ill,waxing), O=obsDir(), N=[0,1,0];
  let At=unit(cross(N,S)); if(!isFinite(At[0])||Math.hypot(At[0],At[1],At[2])<1e-6) At=unit(cross([1,0,0],S));
  const Bt=unit(cross(S,At));
  const term=[];
  for(let i=0;i<=360;i+=2){ const t=i*D2R;
    const v=[Math.cos(t)*At[0]+Math.sin(t)*Bt[0],Math.cos(t)*At[1]+Math.sin(t)*Bt[1],Math.cos(t)*At[2]+Math.sin(t)*Bt[2]];
    term.push({v,vis:dot(v,O)}) }
  const arc=extractRun(term,p=>p.vis>0);

  const Ao=unit(cross(N,O)), Bo=unit(cross(O,Ao));
  const limb=[];
  for(let i=0;i<=360;i+=2){ const t=i*D2R;
    const v=[Math.cos(t)*Ao[0]+Math.sin(t)*Bo[0],Math.cos(t)*Ao[1]+Math.sin(t)*Bo[1],Math.cos(t)*Ao[2]+Math.sin(t)*Bo[2]];
    limb.push({v,lit:dot(v,S)}) }
  let larc=extractRun(limb,p=>p.lit<0);

  let poly=[];
  if(!arc.length){ poly = (ill<0.5)? limb.map(p=>p.v) : [] }
  else{
    const pe=arc[arc.length-1].v;
    if(larc.length){
      const dS=dist3(larc[0].v,pe), dE=dist3(larc[larc.length-1].v,pe);
      if(dE<dS) larc=larc.slice().reverse();
    }
    poly = arc.map(p=>p.v).concat(larc.map(p=>p.v));
  }
  return {termArc:arc.map(p=>p.v), poly:poly};
}

// ════════════════════════  5 · ICONS  ════════════════════════
let gradSeq=0;
function moonGlyph(ill,waxing,sz){          // gold-foil phase disc (from reference build)
  const r=sz/2-1.5, cx=sz/2, cy=sz/2, top=(cy-r).toFixed(2), bot=(cy+r).toFixed(2);
  const gid='zclmg'+(++gradSeq);
  const defs=`<defs><radialGradient id="${gid}" gradientUnits="userSpaceOnUse" cx="${(cx-r*.3).toFixed(2)}" cy="${(cy-r*.38).toFixed(2)}" r="${(r*1.7).toFixed(2)}">`
    +`<stop offset="0%" stop-color="#FFF6D8"/><stop offset="22%" stop-color="#F3DC97"/><stop offset="48%" stop-color="#D4AF5A"/>`
    +`<stop offset="74%" stop-color="#B08C3E"/><stop offset="100%" stop-color="#7C5F2A"/></radialGradient></defs>`;
  const gold='url(#'+gid+')', dark='#1c1b24';
  const rim=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#CBA85A" stroke-width=".85" stroke-opacity=".55"/>`;
  const body=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}"/>`;
  if(ill<0.02) return defs+body+rim;
  if(ill>0.98) return defs+`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${gold}"/>`+rim;
  const limb = waxing ? `M ${cx} ${top} A ${r} ${r} 0 0 1 ${cx} ${bot} Z` : `M ${cx} ${top} A ${r} ${r} 0 0 0 ${cx} ${bot} Z`;
  const rx=(r*Math.abs(Math.cos(2*Math.PI*(waxing?ill*0.5:1-ill*0.5)))).toFixed(2);
  const termFill = ill>0.5 ? gold : dark;
  return defs+body+`<path d="${limb}" fill="${gold}"/>`+`<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${r}" fill="${termFill}"/>`+rim;
}
function moonSVG(ill,waxing,sz){ return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">${moonGlyph(ill,waxing,sz)}</svg>` }

// ════════════════════════  6 · RENDER  ════════════════════════
const NOW=new Date();
let selDate=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate());
let activeCats={sea:false,crater:true,apollo:false};
let userSetCats=false;   // once the person toggles a category, stop auto-adjusting
let showTerm=true;
let selFeature=null;
const $=id=>document.getElementById(id);
function isoKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}

// background star field
(function(){let s='';for(let i=0;i<150;i++){s+=`<circle cx="${(Math.random()*800).toFixed(1)}" cy="${(Math.random()*700).toFixed(1)}" r="${(Math.random()*.9+.2).toFixed(2)}" fill="#fff" opacity="${(Math.random()*.6+.1).toFixed(2)}"/>`}$('zcl-m-stars').innerHTML=s})();
// corner flourishes
(function(){const fl='<svg viewBox="0 0 40 40" fill="none" stroke="#CBA85A" stroke-width="1" stroke-linecap="round">'
  +'<path d="M2 2 L2 14" stroke-width="1.4"/><path d="M2 2 L14 2" stroke-width="1.4"/>'
  +'<path d="M2 7 C12 7 7 17 17 17" opacity=".9"/><path d="M7 2 C7 12 17 7 17 17" opacity=".9"/>'
  +'<path d="M2 19 C9 19 9 12 2 12" opacity=".55"/><path d="M19 2 C19 9 12 9 12 2" opacity=".55"/>'
  +'<circle cx="17" cy="17" r="1.5" fill="#E6CC85" stroke="none"/><circle cx="2.5" cy="2.5" r="1" fill="#E6CC85" stroke="none"/></svg>';
  document.querySelectorAll('.zcl-m-fl').forEach(el=>el.innerHTML=fl)})();

// coming-nights strip
function buildStrip(){
  const strip=$('zcl-m-strip'); strip.innerHTML='';
  for(let i=0;i<16;i++){
    const d=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()+i);
    const mp=moonPhase(d);
    const el=document.createElement('div');
    el.className='zcl-m-night'+(isoKey(d)===isoKey(selDate)?' sel':'')+(i===0?' today':'');
    el.setAttribute('data-key',isoKey(d));
    el.innerHTML='<span class="zcl-m-ndow">'+(i===0?'Today':DOW[d.getDay()])+'</span>'
      +'<span class="zcl-m-nglyph">'+moonSVG(mp.ill,mp.waxing,30)+'</span>'
      +'<span class="zcl-m-ndate">'+(d.getMonth()+1)+'/'+d.getDate()+'</span>';
    el.addEventListener('click',()=>{ selDate=d; selFeature=null; renderAll() });
    strip.appendChild(el);
  }
}

// the labelled map + terminator
function renderMap(){
  const svg=$('zcl-m-svg');
  const mp=moonPhase(selDate);
  const S=sunDir(mp.ill,mp.waxing);
  let out='';

  // shadow + terminator
  if(showTerm){
    const g=terminatorGeom(mp.ill,mp.waxing);
    if(g.poly.length>2){
      const dpath=g.poly.map((v,i)=>{const p=projVec(v);return (i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)}).join(' ')+' Z';
      out+='<clipPath id="zcl-m-disc"><circle cx="'+CX+'" cy="'+CY+'" r="'+R+'"/></clipPath>';
      out+='<path d="'+dpath+'" fill="rgba(4,3,9,0.66)" clip-path="url(#zcl-m-disc)"/>';
    }
    if(g.termArc.length>1){
      const tpath=g.termArc.map((v,i)=>{const p=projVec(v);return (i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)}).join(' ');
      out+='<path d="'+tpath+'" fill="none" stroke="#E8C24A" stroke-width="2.4" stroke-opacity=".85" stroke-linecap="round"/>';
    }
  }

  // orientation ticks (N up, E = Crisium side on the right)
  out+='<text class="zcl-m-orient" x="'+CX+'" y="'+(CY-R-10)+'" text-anchor="middle">N</text>';
  out+='<text class="zcl-m-orient" x="'+(CX+R+8)+'" y="'+(CY+7)+'" text-anchor="start">E</text>';
  out+='<text class="zcl-m-orient" x="'+(CX-R-8)+'" y="'+(CY+7)+'" text-anchor="end">W</text>';

  // feature markers — gather visible features first
  const vis=[];
  FEATURES.forEach((f,idx)=>{
    if(!activeCats[f.t]) return;
    const p=project(f.lon,f.lat);
    if(p.vis<-0.02) return;                         // hidden on the far side
    const v=[Math.cos(f.lat*D2R)*Math.sin(f.lon*D2R),Math.sin(f.lat*D2R),Math.cos(f.lat*D2R)*Math.cos(f.lon*D2R)];
    const litv=dot(v,S);
    vis.push({f,idx,p,col:CATCOL[f.t],nearTerm:(showTerm&&p.vis>0.05&&Math.abs(litv)<0.10),sel:(selFeature===idx)});
  });
  // pass 1: generous transparent tap targets (fingertip-sized on phones), beneath the art
  vis.forEach(o=>{
    out+='<circle class="zcl-m-hit" data-i="'+o.idx+'" cx="'+o.p.x.toFixed(1)+'" cy="'+o.p.y.toFixed(1)+'" r="32" fill="#000" fill-opacity="0" pointer-events="all"/>';
  });
  // pass 2: visible dots, terminator rings, and labels — drawn on top so direct taps always land
  vis.forEach(o=>{
    const {f,idx,p,col,nearTerm,sel}=o;
    const r0 = sel?10:8;
    if(nearTerm) out+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(r0+8)+'" fill="none" stroke="#E8C24A" stroke-width="2" stroke-opacity=".8" pointer-events="none"/>';
    out+='<circle class="zcl-m-dot" data-i="'+idx+'" cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+r0+'" fill="'+col+'" fill-opacity="'+(sel?'1':'.55')+'" stroke="'+col+'" stroke-opacity="'+(sel?'1':'.8')+'" stroke-width="2"/>';
    // label: place outward, but flip inward near the limb so it never clips
    const fs = sel?26:22;
    const approxW = f.n.length * fs * 0.56;
    let left = p.x < CX;
    if(left && (p.x - r0 - 6 - approxW) < 8) left=false;
    if(!left && (p.x + r0 + 6 + approxW) > IMG_W-8) left=true;
    const lx = left ? p.x-r0-6 : p.x+r0+6;
    const anchor = left ? 'end' : 'start';
    out+='<text class="zcl-m-lbl" x="'+lx.toFixed(1)+'" y="'+(p.y+fs*0.34).toFixed(1)+'" text-anchor="'+anchor+'" font-size="'+fs+'" data-i="'+idx+'" style="cursor:pointer;fill:'+(sel?'#FBF1D2':'#EBDFB8')+';fill-opacity:'+(sel?'1':'.85')+'">'+f.n+'</text>';
  });

  svg.innerHTML=out;
  // wire taps (delegate)
  svg.querySelectorAll('[data-i]').forEach(el=>{
    el.addEventListener('click',()=>{ selFeature=+el.getAttribute('data-i'); renderMap(); renderDetail() });
  });
}

// Features sitting on tonight's terminator (visible, sun-angle near grazing).
function terminatorFeatures(date){
  const mp=moonPhase(date);
  if(mp.ill<=0.03 || mp.ill>=0.97) return [];
  const S=sunDir(mp.ill,mp.waxing);
  return FEATURES.map(f=>{
    const v=[Math.cos(f.lat*D2R)*Math.sin(f.lon*D2R),Math.sin(f.lat*D2R),Math.cos(f.lat*D2R)*Math.cos(f.lon*D2R)];
    const p=project(f.lon,f.lat);
    return {f,d:Math.abs(dot(v,S)),vis:p.vis};
  }).filter(o=>o.vis>0.05 && o.d<0.12).sort((a,b)=>a.d-b.d).map(o=>o.f);
}

// Smart default: craters on, seas/apollo off — unless a given night's terminator
// is heavy with seas (>=3) or includes an Apollo site, in which case surface those
// too. Stops adjusting the moment the person toggles a category themselves.
function autoCats(date){
  if(userSetCats) return;
  const tf=terminatorFeatures(date);
  const seas=tf.filter(f=>f.t==='sea').length, apollo=tf.filter(f=>f.t==='apollo').length;
  activeCats={ sea: seas>=3, crater:true, apollo: apollo>=1 };
  document.querySelectorAll('.zcl-m-chip').forEach(chip=>{
    const c=chip.getAttribute('data-cat');
    if(c==='sea'||c==='crater'||c==='apollo') chip.classList.toggle('on', activeCats[c]);
  });
}

// Format a Date as local Mountain Time, e.g. "9:45 PM"
function fmtT(d){
  if(!d||isNaN(d)) return null;
  return new Intl.DateTimeFormat('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit',hour12:true}).format(d);
}
// Moonrise / moonset for a given night at Zion (via SunCalc)
function moonRiseSet(date){
  if(typeof SunCalc==='undefined') return {rise:'\u2014',set:'\u2014'};
  let mt; try{ mt=SunCalc.getMoonTimes(date,LAT,LNG) }catch(e){ return {rise:'\u2014',set:'\u2014'} }
  if(mt.alwaysUp)   return {rise:'Up all night',set:'Up all night'};
  if(mt.alwaysDown) return {rise:'Below horizon',set:'Below horizon'};
  return {rise:mt.rise?fmtT(mt.rise):'\u2014', set:mt.set?fmtT(mt.set):'\u2014'};
}

// phase readout + terminator feature list
function renderReadout(){
  const mp=moonPhase(selDate);
  $('zcl-m-rglyph').innerHTML=moonSVG(mp.ill,mp.waxing,58);
  $('zcl-m-rdate').textContent=DOW[selDate.getDay()]+' · '+MO[selDate.getMonth()]+' '+selDate.getDate();
  $('zcl-m-rphase').textContent=mp.name;
  $('zcl-m-rill').textContent=Math.round(mp.ill*100)+'% illuminated';
  const rs=moonRiseSet(selDate);
  $('zcl-m-rmoon').innerHTML='<span><i>&#x2197;</i>Rise <b>'+rs.rise+'</b></span>'
    +'<span><i>&#x2198;</i>Set <b>'+rs.set+'</b></span>';
  const termEl=$('zcl-m-rterm');
  if(showTerm && mp.ill>0.03 && mp.ill<0.97){
    const near=terminatorFeatures(selDate).slice(0,3).map(f=>f.n);
    termEl.innerHTML = near.length
      ? 'On the terminator tonight: <b>'+near.join(', ')+'</b> — best shadow relief now.'
      : '';
  } else if(mp.ill>=0.97){
    termEl.innerHTML='Full disc lit \u2014 no terminator shadows. Ray systems (Tycho, Copernicus) take over.';
  } else if(mp.ill<=0.03){
    termEl.innerHTML='New moon \u2014 the near side is dark.';
  } else termEl.innerHTML='';
}

function renderDetail(){
  const det=$('zcl-m-detail');
  if(selFeature===null){ det.className='zcl-m-detail'; det.innerHTML=''; return }
  const f=FEATURES[selFeature];
  const hemiNS=f.lat>=0?'N':'S', hemiEW=f.lon>=0?'E':'W';
  const mp=moonPhase(selDate);
  const S=sunDir(mp.ill,mp.waxing);
  const v=[Math.cos(f.lat*D2R)*Math.sin(f.lon*D2R),Math.sin(f.lat*D2R),Math.cos(f.lat*D2R)*Math.cos(f.lon*D2R)];
  const lit=dot(v,S);
  let litTxt='', litCol='#8A7C5C';
  if(mp.ill>0.03&&mp.ill<0.97){
    if(Math.abs(lit)<0.12){litTxt='On the terminator tonight \u2014 prime viewing, long shadows.';litCol='#E8C24A'}
    else if(lit>0){litTxt='In sunlight tonight.';litCol='#C9BD97'}
    else{litTxt='In lunar night tonight \u2014 wait for the terminator to reach it.';litCol='#7A8AA0'}
  }
  det.innerHTML='<div class="zcl-m-dtype">'+CATNAME[f.t]+'</div>'
    +'<div class="zcl-m-dname"><i style="background:'+CATCOL[f.t]+'"></i>'+f.n+'</div>'
    +'<div class="zcl-m-dbody">'+f.d+'</div>'
    +'<div class="zcl-m-dcoord">Selenographic '+Math.abs(f.lat)+'\u00B0 '+hemiNS+', '+Math.abs(f.lon)+'\u00B0 '+hemiEW+'</div>'
    +(litTxt?'<div class="zcl-m-dlit" style="color:'+litCol+'">'+litTxt+'</div>':'');
  det.className='zcl-m-detail open';
}

function renderStripSel(){
  document.querySelectorAll('.zcl-m-night').forEach(el=>{
    el.classList.toggle('sel', el.getAttribute('data-key')===isoKey(selDate));
  });
}

function renderAll(){ autoCats(selDate); renderStripSel(); renderMap(); renderReadout(); renderDetail() }

// ════════════════════════  7 · INIT  ════════════════════════
$('zcl-m-chips').addEventListener('click',e=>{
  const chip=e.target.closest('.zcl-m-chip'); if(!chip) return;
  const cat=chip.getAttribute('data-cat');
  if(cat==='term'){ showTerm=!showTerm; chip.classList.toggle('on',showTerm) }
  else{ userSetCats=true; activeCats[cat]=!activeCats[cat]; chip.classList.toggle('on',activeCats[cat]);
        if(selFeature!==null && !activeCats[FEATURES[selFeature].t]){selFeature=null} }
  renderMap(); renderReadout(); renderDetail();
});
function stepDay(delta){
  selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()+delta);
  selFeature=null; renderAll();
}
$('zcl-m-prev').addEventListener('click',()=>stepDay(-1));
$('zcl-m-next').addEventListener('click',()=>stepDay(1));
document.addEventListener('keydown',e=>{
  const ae=document.activeElement; if(ae&&ae.tagName==='INPUT') return;
  if(e.key==='ArrowRight'){stepDay(1)} else if(e.key==='ArrowLeft'){stepDay(-1)}
});

buildStrip();
renderAll();

})();
</script>

<script>
(function(){
  var modal=document.getElementById('zcl-set-modal');
  var frame=document.getElementById('zcl-set-frame');
  var backdrop=document.getElementById('zcl-set-backdrop');
  var gear=document.getElementById('pwa-night-btn')||document.getElementById('zcl-sf-nightbtn');
  var loaded=false;
  function open(){
    if(!loaded){ frame.src='settings.html?embed=1'; loaded=true }
    modal.classList.add('on');
  }
  function close(){ modal.classList.remove('on') }
  if(gear){
    gear.addEventListener('click', function(e){ e.preventDefault(); open() });
  }
  backdrop.addEventListener('click', close);
  // Messages from the settings iframe
  window.addEventListener('message', function(e){
    var d=e.data||{};
    if(d.type==='zcl-close'){ close() }
    else if(d.type==='zcl-night'){
      document.body.classList.toggle('night-mode', !!d.on);
      if(gear) gear.classList.toggle('on', !!d.on);
    }
    // zcl-fov: nothing to do live; finder re-reads sfVFOV on open
  });
})();
</script>


<script>
/* PWA install relay — beforeinstallprompt only fires on the top-level page, not
   inside the settings iframe, so we capture it here and bridge it to Settings. */
(function(){
  var deferred = null;
  function frameWin(){
    var f = document.getElementById('zcl-set-frame') || document.getElementById('es-set-frame');
    return f && f.contentWindow ? f.contentWindow : null;
  }
  function tellFrame(msg){ var w = frameWin(); if(w) w.postMessage(msg, '*') }
  window.addEventListener('beforeinstallprompt', function(ev){
    ev.preventDefault();
    deferred = ev;
    tellFrame({ type:'zcl-install-available' });
  });
  window.addEventListener('appinstalled', function(){
    deferred = null;
    tellFrame({ type:'zcl-installed' });
  });
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.type === 'zcl-do-install' && deferred){
      deferred.prompt();
      deferred.userChoice.finally(function(){ deferred = null });
    } else if(d.type === 'zcl-install-query'){
      tellFrame({ type: deferred ? 'zcl-install-available' : 'zcl-install-none' });
    }
  });
})();
</script>
