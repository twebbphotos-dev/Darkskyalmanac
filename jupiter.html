<script>
"use strict";
(function(){

// ════════════════════════  CONSTANTS  ════════════════════════
// Display timezone (matches the rest of the almanac suite). The math is
// UTC-based, so this only affects what clock the times are printed in.
let TZ = 'America/Denver';
const D2R = Math.PI/180;

const MOON_INFO = [
  {name:'Io',       col:'#E8C14E', size:'3,643 km', period:'1.77 days',
   why:'The most volcanically active world in the solar system — over 400 active volcanoes, some flinging plumes hundreds of kilometres high. Squeezed and flexed by Jupiter\u2019s immense gravity and the tug of the outer moons, its interior stays molten. The innermost Galilean, it never strays far from the planet.'},
  {name:'Europa',   col:'#D8E0E8', size:'3,122 km', period:'3.55 days',
   why:'A smooth ball of water-ice criss-crossed with reddish fractures, hiding a salty ocean beneath its frozen shell that holds more liquid water than all of Earth\u2019s oceans combined. One of the most promising places to search for life beyond Earth, and the target of NASA\u2019s Europa Clipper mission.'},
  {name:'Ganymede', col:'#C9B79A', size:'5,268 km', period:'7.15 days',
   why:'The largest moon in the solar system — bigger than the planet Mercury — and the only moon known to generate its own magnetic field. Its ancient surface mixes dark cratered terrain with bright grooved ridges, and it too is thought to hide a buried ocean.'},
  {name:'Callisto', col:'#9C8C76', size:'4,821 km', period:'16.69 days',
   why:'The most heavily cratered object in the solar system, its dark icy surface a near-pristine record of 4 billion years of bombardment. The outermost Galilean orbits well clear of Jupiter\u2019s harsh radiation, making it a likely staging post for future human exploration.'},
];

// ═══════════════════════  3 · ASTRONOMY  ═══════════════════════
function jdUTC(d){ return d.getTime()/86400000 + 2440587.5 }

// ---- Galilean satellite positions (Meeus, Astronomical Algorithms ch.44,
//      low-accuracy method). Returns, per moon: X (Jupiter equatorial radii,
//      +X = WEST in the sky / sky-direct view), Z (+ = behind disc, < 0 = in
//      front / transiting). Validated against theskylive transit timings. ----
function galilean(date){
  const JD = jdUTC(date);
  const d  = JD - 2451545.0;
  const V = (172.74 + 0.00111588*d)*D2R;
  const M = (357.529 + 0.9856003*d)*D2R;
  const N = (20.020 + 0.0830853*d + 0.329*Math.sin(V))*D2R;
  const J = (66.115 + 0.9025179*d - 0.329*Math.sin(V))*D2R;
  const A = (1.915*Math.sin(M) + 0.020*Math.sin(2*M))*D2R;
  const B = (5.555*Math.sin(N) + 0.168*Math.sin(2*N))*D2R;
  const K = J + A - B;
  const R = 1.00014 - 0.01671*Math.cos(M) - 0.00014*Math.cos(2*M);
  const r = 5.20872 - 0.25208*Math.cos(N) - 0.00611*Math.cos(2*N);
  const Delta = Math.sqrt(r*r + R*R - 2*r*R*Math.cos(K));
  const psi = Math.asin(R/Delta*Math.sin(K));
  const lt = Delta/173;                      // light-time, days
  const u1 = (163.8067 + 203.4058643*(d-lt) + (psi-B)/D2R)*D2R;
  const u2 = (358.4108 + 101.2916334*(d-lt) + (psi-B)/D2R)*D2R;
  const u3 = (5.7129   +  50.2345179*(d-lt) + (psi-B)/D2R)*D2R;
  const u4 = (224.8151 +  21.4879801*(d-lt) + (psi-B)/D2R)*D2R;
  const G = (331.18 + 50.310482*(d-lt))*D2R;
  const H = (87.40  + 21.569231*(d-lt))*D2R;
  const corr = [
    0.473*Math.sin(2*(u1-u2)),
    1.065*Math.sin(2*(u2-u3)),
    0.165*Math.sin(G),
    0.843*Math.sin(H)
  ];
  const radii = [5.9057, 9.3966, 14.9883, 26.3617];
  const us = [u1,u2,u3,u4];
  return MOON_INFO.map((m,i)=>{
    const u = us[i] + corr[i]*D2R;
    return {
      name:m.name, col:m.col,
      X: radii[i]*Math.sin(u),    // +west
      Z: -radii[i]*Math.cos(u),   // +behind, <0 in front
    };
  });
}

// Classify a moon's apparent state for the reader.
function moonState(m){
  const front = m.Z < 0;
  if(Math.abs(m.X) < 1.02){          // projected onto the disc
    if(front)  return {key:'front',  label:'In transit'};
    return {key:'behind', label:'Behind Jupiter'};
  }
  return m.X > 0
    ? {key:'west', label:'West of Jupiter'}     // +X = west in the sky
    : {key:'east', label:'East of Jupiter'};
}

// ---- Jupiter central meridian (System II) & Great Red Spot transits ----
// CM formula: Project Pluto (accurate ~1°). GRS longitude anchored to
// Sky & Telescope: 85° (System II) on 2026-02-01, drifting +1.75°/month.
const JUP_ROT_II = 870.1869147;            // deg/day, System II
function cmII(date){
  const jd = jdUTC(date);
  const jup_mean = (jd-2455636.938)*360/4332.89709;
  const eqn = 5.55*Math.sin(jup_mean*D2R);
  const ang = (jd-2451870.628)*360/398.884 - eqn;
  const corr = 11*Math.sin(ang*D2R) + 5*Math.cos(ang*D2R)
             - 1.25*Math.cos(jup_mean*D2R) - eqn;
  let cm = 181.62 + JUP_ROT_II*jd + corr;
  return ((cm%360)+360)%360;
}
function grsLongitude(date){
  const ref = Date.UTC(2026,1,1);          // 2026-02-01
  const months = (date.getTime()-ref)/86400000/30.4375;
  return (((85 + 1.75*months)%360)+360)%360;
}
// How far (deg) the GRS is from the central meridian right now.
// 0 = transiting (dead centre); positive = still approaching from the east.
function grsOffset(date){
  let off = grsLongitude(date) - cmII(date);
  off = ((off%360)+360)%360;
  if(off>180) off -= 360;                  // -180..180; <0 = just past centre
  return off;
}
// Next N times the GRS crosses the central meridian, from `date` forward.
function nextGRSTransits(date,n){
  const out=[]; let t=date.getTime();
  for(let i=0;i<n;i++){
    const dCur=new Date(t);
    let ahead = grsLongitude(dCur) - cmII(dCur);
    ahead = ((ahead%360)+360)%360;          // 0..360 deg until next transit
    if(ahead < 2) ahead += 360;             // if essentially now, take the following one
    t += ahead/JUP_ROT_II*86400000;
    out.push(new Date(t));
    t += 60000;                             // nudge past
  }
  return out;
}

// ═══════════════════════  4 · TIME HELPERS  ═══════════════════════
function fmtClock(d){
  return new Intl.DateTimeFormat('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit',hour12:true}).format(d);
}
function fmtFull(d){
  return new Intl.DateTimeFormat('en-US',{timeZone:TZ,weekday:'short',month:'short',day:'numeric',
    hour:'numeric',minute:'2-digit',hour12:true}).format(d);
}
function fmtDayTime(d){
  return new Intl.DateTimeFormat('en-US',{timeZone:TZ,month:'short',day:'numeric',
    hour:'numeric',minute:'2-digit',hour12:true}).format(d);
}
function relTime(d, from){
  let mins = Math.round((d-from)/60000);
  if(mins<0) mins=0;
  if(mins<60) return 'in '+mins+' min';
  const h=Math.floor(mins/60), m=mins%60;
  if(h<24) return 'in '+h+'h '+(m?m+'m':'').trim();
  const days=Math.floor(h/24);
  return 'in '+days+'d '+(h%24)+'h';
}


// ═══════════════════════  5 · RENDER  ═══════════════════════
const $=id=>document.getElementById(id);

// background star field
(function(){
  let s='';
  for(let i=0;i<150;i++){
    s+='<circle cx="'+(Math.random()*800).toFixed(1)+'" cy="'+(Math.random()*700).toFixed(1)
      +'" r="'+(Math.random()*.9+.2).toFixed(2)+'" fill="#fff" opacity="'+(Math.random()*.6+.1).toFixed(2)+'"/>';
  }
  $('zcl-jstars').innerHTML=s;
})();
// corner flourishes
(function(){
  const fl='<svg viewBox="0 0 40 40" fill="none" stroke="#CBA85A" stroke-width="1" stroke-linecap="round">'
    +'<path d="M2 2 L2 14" stroke-width="1.4"/><path d="M2 2 L14 2" stroke-width="1.4"/>'
    +'<path d="M2 7 C12 7 7 17 17 17" opacity=".9"/><path d="M7 2 C7 12 17 7 17 17" opacity=".9"/>'
    +'<path d="M2 19 C9 19 9 12 2 12" opacity=".55"/><path d="M19 2 C19 9 12 9 12 2" opacity=".55"/>'
    +'<circle cx="17" cy="17" r="1.5" fill="#E6CC85" stroke="none"/><circle cx="2.5" cy="2.5" r="1" fill="#E6CC85" stroke="none"/></svg>';
  document.querySelectorAll('.zcl-fl').forEach(el=>el.innerHTML=fl);
})();

let gradSeq=0;

// Draw Jupiter's banded disc into an SVG <g>, radius rPx, centred at (cx,cy).
// `cm` is the System-II central meridian; the GRS is drawn when its longitude
// sits within ~70° of the meridian (i.e. on the near hemisphere).
function jupiterDisc(cx,cy,rPx,date,flipX){
  const gid='zcljg'+(++gradSeq), cid='zcljc'+(++gradSeq);
  const ry=rPx*0.935;
  let s='<defs>';
  // sphere base — warm cream-tan gradient matching the real Jupiter palette
  s+='<radialGradient id="'+gid+'" cx="42%" cy="38%" r="68%">'
    +'<stop offset="0%" stop-color="#F3E4C4"/><stop offset="38%" stop-color="#E4CDA0"/>'
    +'<stop offset="72%" stop-color="#C9A977"/><stop offset="100%" stop-color="#8A6E45"/></radialGradient>';
  s+='<clipPath id="'+cid+'"><ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rPx+'" ry="'+ry+'"/></clipPath>';
  s+='</defs>';
  s+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rPx+'" ry="'+ry+'" fill="url(#'+gid+')"/>';
  // belt system
  const belts=[
    [-0.64,0.10,'rgba(150,120,84,.30)'],
    [-0.40,0.13,'rgba(150,116,78,.55)'],
    [-0.17,0.16,'rgba(120,86,54,.72)'],
    [ 0.05,0.10,'rgba(176,140,96,.30)'],
    [ 0.22,0.15,'rgba(126,90,58,.70)'],
    [ 0.45,0.12,'rgba(150,116,78,.50)'],
    [ 0.66,0.10,'rgba(150,120,84,.30)'],
  ];
  s+='<g clip-path="url(#'+cid+')">';
  belts.forEach(b=>{
    const yc=cy+b[0]*ry, hh=b[1]*ry;
    s+='<rect x="'+(cx-rPx)+'" y="'+(yc-hh)+'" width="'+(2*rPx)+'" height="'+(2*hh)+'" fill="'+b[2]+'"/>';
  });
  // Great Red Spot
  const off=grsOffset(date);
  if(Math.abs(off) < 78){
    let frac=Math.sin(off*D2R);
    if(flipX) frac=-frac;
    const gx=cx + frac*rPx*0.92;
    const gy=cy + 0.22*ry;
    const vis=Math.cos(off*D2R);
    const gw=rPx*0.20*(0.4+0.6*vis), gh=rPx*0.12;
    const ggid='zclgrs'+(++gradSeq);
    s+='<defs><radialGradient id="'+ggid+'" cx="50%" cy="42%" r="60%">'
      +'<stop offset="0%" stop-color="#E07B4A"/><stop offset="55%" stop-color="#C25A2E"/>'
      +'<stop offset="100%" stop-color="#9A4322"/></radialGradient></defs>';
    s+='<ellipse cx="'+gx.toFixed(1)+'" cy="'+gy.toFixed(1)+'" rx="'+gw.toFixed(1)+'" ry="'+gh.toFixed(1)
      +'" fill="url(#'+ggid+')" opacity="'+(0.45+0.55*vis).toFixed(2)+'" stroke="rgba(120,50,28,.5)" stroke-width=".7"/>';
  }
  s+='</g>';
  s+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rPx+'" ry="'+ry+'" fill="none" stroke="rgba(60,40,24,.5)" stroke-width="1.4"/>';
  s+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rPx+'" ry="'+ry+'" fill="none" stroke="rgba(203,168,90,.25)" stroke-width=".6"/>';
  return s;
}

// Render the full eyepiece field for `date` in the current view mode.
let viewMode='direct';
function renderField(date){
  const W=920, H=420, cy=H*0.46;
  const cx=W/2;
  const flipX = (viewMode==='inverted'||viewMode==='mirrored');
  const flipY = (viewMode==='inverted');

  const moons=galilean(date);

  // Jupiter is the star of the show, so we keep the disc large and detailed
  // every night. The moons span up to 26 radii (Callisto) but most sit much
  // closer; rather than let a far-flung Callisto shrink the planet, we map
  // distance through a gentle square-root compression. Moons keep their correct
  // order, side, and near/far ranking — the disc just stays big and legible.
  const rPx=70;                                  // generous fixed Jupiter radius
  const halfW=W/2 - 64;                          // usable half-width in px
  // largest apparent distance tonight (floor so a tight night isn't over-spread)
  const maxOut=Math.max(7, ...moons.map(m=>Math.abs(m.X)));
  // compressed screen-x: sign * (disc + k*sqrt(dist beyond limb))
  const k = (halfW - rPx) / Math.sqrt(maxOut);
  function mapX(Xr){
    const a=Math.abs(Xr);
    if(a < 1.05) return Xr*rPx;                  // on/near the disc: linear, true position
    const px = rPx + k*(Math.sqrt(a) - Math.sqrt(1.05));
    return Math.sign(Xr)*px;
  }

  let svg='';
  // orbital-plane guide line
  svg+='<line x1="40" y1="'+cy+'" x2="'+(W-40)+'" y2="'+cy+'" stroke="rgba(203,168,90,.16)" stroke-width="1"/>';

  // direction labels (depend on view flip)
  const leftLab = flipX ? 'WEST' : 'EAST';
  const rightLab= flipX ? 'EAST' : 'WEST';
  svg+='<text x="44" y="'+(H-16)+'" class="zcl-vlabel" text-anchor="start">'+leftLab+'</text>';
  svg+='<text x="'+(W-44)+'" y="'+(H-16)+'" class="zcl-vlabel" text-anchor="end">'+rightLab+'</text>';

  function sx(Xr){ let x=mapX(Xr); if(flipX) x=-x; return cx + x }

  // split behind/front so the disc occludes correctly
  const behind=[], front=[];
  moons.forEach(m=>{
    const onDisc = Math.abs(m.X) < 1.05;
    const hidden = onDisc && m.Z>0;
    (m.Z>0 ? behind : front).push({m,onDisc,hidden});
  });

  // ---- label placement: stagger into tiers so names never collide ----
  const visible=moons.filter(m=>!(Math.abs(m.X)<1.05 && m.Z>0))
                     .map(m=>({m, x:sx(m.X)}))
                     .sort((a,b)=>a.x-b.x);
  const TIER=20, LBL_HALF=34;
  const labelY={};
  const placedAbove=[], placedBelow=[];   // x-positions used per side
  visible.forEach((v,i)=>{
    let up = (i%2===0);                    // alternate above/below by default
    const lane = up?placedAbove:placedBelow;
    // tier 1,2,3... until clear of neighbours on this side
    let tier=1;
    while(lane.some(px=>Math.abs(px.x - v.x) < LBL_HALF*2 && px.tier===tier)) tier++;
    lane.push({x:v.x,tier});
    const base = rPx + 16;
    labelY[v.m.name] = up ? cy - base - (tier-1)*TIER
                          : cy + base + (tier-1)*TIER + 4;
  });

  function drawMoon(o){
    const m=o.m;
    if(o.hidden) return '';
    const x=sx(m.X), y=cy;
    const rad = (m.name==='Ganymede')?7:(m.name==='Callisto')?6.5:(m.name==='Io')?6:6;
    const imgFile = m.name.toLowerCase()+'.jpg';
    const cid='zclmc'+(++gradSeq);
    let g='';
    g+='<defs><clipPath id="'+cid+'"><circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rad+'"/></clipPath></defs>';
    g+='<image href="img/'+imgFile+'" x="'+(x-rad).toFixed(1)+'" y="'+(y-rad).toFixed(1)+'" width="'+(rad*2)+'" height="'+(rad*2)+'" clip-path="url(#'+cid+')" preserveAspectRatio="xMidYMid slice"/>';
    // subtle rim
    g+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rad+'" fill="none" stroke="'+m.col+'" stroke-opacity=".6" stroke-width=".8"/>';
    g+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(rad+3.5)+'" fill="none" stroke="'+m.col+'" stroke-opacity=".25" stroke-width=".7"/>';
    const ly=labelY[m.name];
    if(Math.abs(ly-y) > rad+18){
      const tgt = ly<y ? ly+9 : ly-11;
      g+='<line x1="'+x.toFixed(1)+'" y1="'+(y+(ly<y?-rad-2:rad+2)).toFixed(1)+'" x2="'+x.toFixed(1)+'" y2="'+tgt.toFixed(1)
        +'" stroke="'+m.col+'" stroke-opacity=".3" stroke-width=".7"/>';
    }
    g+='<text x="'+x.toFixed(1)+'" y="'+ly.toFixed(1)+'" class="zcl-mnlabel" text-anchor="middle" '
      +'style="fill:'+m.col+'">'+m.name+'</text>';
    return g;
  }

  behind.forEach(o=>{ svg+=drawMoon(o) });
  svg+=jupiterDisc(cx,cy,rPx,date,flipX);
  front.forEach(o=>{ svg+=drawMoon(o) });

  // "N" tick so flips are legible
  const ny = flipY ? cy+rPx*0.935+16 : cy-rPx*0.935-10;
  svg+='<text x="'+cx+'" y="'+ny.toFixed(1)+'" class="zcl-vlabel" text-anchor="middle">N</text>';

  $('zcl-field').innerHTML=svg;
}


// ═══════════════════════  6 · DETAIL PANELS  ═══════════════════════
function card(label,val,sub,cls){
  return '<div class="zcl-pcard'+(cls?' '+cls:'')+'">'
    +'<div class="zcl-pclabel">'+label+'</div>'
    +'<div class="zcl-pcval">'+val+'</div>'
    +(sub?'<div class="zcl-pcsub">'+sub+'</div>':'')+'</div>';
}

function renderBody(date){
  let html='';

  // ── Great Red Spot ──
  const off=grsOffset(date);
  const transiting = Math.abs(off) < 8;       // within ~13 min of dead centre
  const wellPlaced = Math.abs(off) < 50;      // S&T: well placed ±50 min ≈ ±50°
  html+='<div class="zcl-psec"><div class="zcl-psec-label">The Great Red Spot</div>';
  let cls, dotcol, msg;
  if(transiting){
    cls='vis'; dotcol='#E07B4A';
    msg='<b>Crossing the centre right now.</b> The Red Spot is squarely facing Earth, dead-centre on Jupiter’s disc — the best possible moment to catch it.';
  }else if(wellPlaced){
    cls='vis'; dotcol='#D6844A';
    const side = off>0 ? 'rotating into view and heading toward the centre' : 'past the centre and rotating toward the edge';
    msg='<b>Visible now.</b> The Red Spot is on the side of Jupiter facing us, '+side+'.';
  }else{
    cls='hidden'; dotcol='#6a6a6a';
    msg='Right now it’s turned to the far side of Jupiter, out of view. Jupiter spins once every 10 hours, so the spot comes back around to face us a couple of times a day.';
  }
  html+='<div class="zcl-grsnow '+cls+'"><span class="zcl-grsdot" style="background:'+dotcol+'"></span><span>'+msg+'</span></div>';

  const trs=nextGRSTransits(date,3);
  html+='<div class="zcl-pcard">';
  html+='<div class="zcl-pclabel">Next times it faces us</div>';
  trs.forEach(t=>{
    html+='<div class="zcl-transit-row"><span class="zcl-transit-when">'+fmtDayTime(t)
      +'</span><span class="zcl-transit-rel">'+relTime(t,date)+'</span></div>';
  });
  html+='<div class="zcl-note">These are the moments the Red Spot crosses the middle of Jupiter\u2019s disc, when it faces Earth most directly. It stays well placed for about an hour before and after. Times follow Sky &amp; Telescope\u2019s tracking of the spot and can run a few minutes off as the storm slowly drifts.</div>';
  html+='</div></div>';

  // ── The moons right now ──
  const moons=galilean(date);
  html+='<div class="zcl-psec"><div class="zcl-psec-label">The Galilean Moons Right Now</div>';
  html+='<div class="zcl-moonlist">';
  // order them as they appear in the sky (west→east by signed X), like the view
  const flipX=(viewMode==='inverted'||viewMode==='mirrored');
  const ordered=moons.slice().sort((a,b)=> (flipX? a.X-b.X : b.X-a.X));
  ordered.forEach(m=>{
    const st=moonState(m);
    const elong=Math.abs(m.X).toFixed(1);
    let sub;
    if(st.key==='front') sub='passing across the disc';
    else if(st.key==='behind') sub='hidden behind the planet';
    else sub=elong+' Jupiter-radii out';
    html+='<div class="zcl-moonchip"><i style="background:'+m.col+'"></i>'
      +'<span><span class="mn">'+m.name+'</span><br><span class="ms">'+sub+'</span></span>'
      +'<span class="zcl-moonstate '+st.key+'">'+st.label+'</span></div>';
  });
  html+='</div>';
  html+='</div>';

  // ── Meet the moons ──
  html+='<div class="zcl-psec"><div class="zcl-psec-label">The Four Worlds</div>';
  html+='<div class="zcl-pcards">';
  MOON_INFO.forEach(m=>{
    const img='img/'+m.name.toLowerCase()+'.jpg';
    html+='<div class="zcl-pcard" style="display:flex;gap:12px;align-items:flex-start">'
      +'<img src="'+img+'" alt="'+m.name+'" class="zcl-moon-thumb" data-src="'+img+'" data-name="'+m.name
      +'" style="width:58px;height:58px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(203,168,90,.3);cursor:pointer">'
      +'<div><div class="zcl-pcval" style="color:'+m.col+';font-size:15px">'+m.name+'</div>'
      +'<div class="zcl-pcsub" style="margin-top:2px">'+m.size+' across · orbits in '+m.period+'</div>'
      +'<div class="zcl-tgtwhy">'+m.why+'</div></div>'
      +'</div>';
  });
  html+='</div></div>';

  // ── Jupiter facts ──
  html+='<div class="zcl-psec"><div class="zcl-psec-label">The Planet Itself</div>';
  html+='<img id="zcl-jupiter-photo" src="img/jupiter.jpg" alt="Jupiter" style="width:100%;border-radius:7px;object-fit:cover;max-height:180px;margin-bottom:11px;border:1px solid rgba(203,168,90,.2);cursor:pointer" title="Tap to enlarge">';
  html+='<div class="zcl-pcards cols3">'
    +card('Disc rotation','9h 56m','One Jupiter \u201Cday\u201D')
    +card('Diameter','139,820 km','11 Earths across')
    +card('Cloud bands','Belts &amp; zones','Dark belts, bright zones')
    +'</div>';
  html+='<div class="zcl-note">The dark stripes are <i>belts</i> — warmer, sinking gas — and the bright stripes are <i>zones</i> of cool, rising cloud. The Great Red Spot is a storm wider than Earth, churning in the South Equatorial Belt for at least 190 years.</div>';
  html+='</div>';

  $('zcl-body').innerHTML=html;
}

// ═══════════════════════  7 · INIT  ═══════════════════════
let viewDate=new Date();
let liveTimer=null, live=true;

function refresh(){
  $('zcl-now').textContent=fmtFull(viewDate);
  $('zcl-stamp').textContent=fmtFull(viewDate);
  renderField(viewDate);
  renderBody(viewDate);
}
function setLive(on){
  live=on;
  const b=$('zcl-nowbtn');
  b.classList.toggle('on',on);
  b.textContent = on ? '● Now' : '○ Now';
  if(on){
    viewDate=new Date();
    refresh();
    if(!liveTimer) liveTimer=setInterval(()=>{ if(live){ viewDate=new Date(); refresh() } },60000);
  }
}
function stepHours(h){
  if(live) setLive(false);
  else { viewDate=new Date(viewDate.getTime()+h*3600000); refresh(); return }
  viewDate=new Date(viewDate.getTime()+h*3600000);
  refresh();
}

$('zcl-back').addEventListener('click',()=>stepHours(-1));
$('zcl-fwd').addEventListener('click',()=>stepHours(1));
$('zcl-nowbtn').addEventListener('click',()=>setLive(true));

// arrow keys step by an hour
document.addEventListener('keydown',e=>{
  const ae=document.activeElement;
  if(ae && ae.tagName==='INPUT') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); stepHours(1) }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); stepHours(-1) }
});

// view-mode toggle
document.querySelectorAll('#zcl-viewbar .zcl-vbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#zcl-viewbar .zcl-vbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    viewMode=b.getAttribute('data-mode');
    refresh();
  });
});

setLive(true);

})();
</script>

<style>

<script>
(function(){
  // Gallery: Jupiter first, then the four moons in order.
  // Captions are short, factual, and in the same voice as the rest of the almanac.
  var GALLERY = [
    { src:'img/jupiter.jpg', name:'Jupiter',
      caption:'A NASA/Hubble composite showing Jupiter\u2019s cloud bands. The dark belts are warmer, descending gas; the bright zones are cool, rising cloud. The Great Red Spot \u2014 the oval storm in the South Equatorial Belt \u2014 has been churning for at least 190 years and is wider than Earth.' },
    { src:'img/io.jpg', name:'Io',
      caption:'The most volcanically active world in the solar system. Squeezed by Jupiter\u2019s immense tidal forces and the gravitational tug of the outer moons, Io\u2019s interior stays permanently molten \u2014 over 400 active volcanoes erupt continuously, some hurling plumes hundreds of kilometres high.' },
    { src:'img/europa.jpg', name:'Europa',
      caption:'A global ocean of liquid water, estimated to hold twice as much water as all of Earth\u2019s oceans, lies beneath Europa\u2019s smooth ice shell. The reddish cracks are fractures in the ice, stained by salts welling up from below. NASA\u2019s Europa Clipper mission launched in 2024 to study its habitability.' },
    { src:'img/ganymede.jpg', name:'Ganymede',
      caption:'The largest moon in the solar system \u2014 bigger than the planet Mercury \u2014 and the only moon known to generate its own magnetic field. Its surface mixes ancient dark cratered terrain with younger bright grooved ridges, and it too is thought to harbour a buried ocean.' },
    { src:'img/callisto.jpg', name:'Callisto',
      caption:'The most heavily cratered object in the solar system, Callisto\u2019s dark icy surface is a near-pristine record of four billion years of bombardment. Orbiting well outside Jupiter\u2019s harsh radiation belts, it is considered a likely staging point for future human exploration of the Jovian system.' },
  ];

  var idx = 0;

  function show(i){
    idx = ((i % GALLERY.length) + GALLERY.length) % GALLERY.length;
    var item = GALLERY[idx];
    document.getElementById('zcl-moon-lb-img').src = item.src;
    document.getElementById('zcl-moon-lb-img').alt = item.name;
    document.getElementById('zcl-moon-lb-title').textContent = item.name;
    document.getElementById('zcl-moon-lb-caption').textContent = item.caption;
  }

  function open(startIdx){
    show(startIdx);
    document.getElementById('zcl-moon-lb').classList.add('on');
  }

  function close(){
    document.getElementById('zcl-moon-lb').classList.remove('on');
  }

  // Thumbnail clicks — moons
  document.addEventListener('click', function(e){
    var t = e.target.closest('.zcl-moon-thumb');
    if(t){
      var name = t.getAttribute('data-name');
      var i = GALLERY.findIndex(function(g){ return g.name === name });
      open(i >= 0 ? i : 1);
    }
  });

  // Jupiter planet photo click
  document.addEventListener('click', function(e){
    if(e.target.id === 'zcl-jupiter-photo') open(0);
  });

  document.getElementById('zcl-lb-prev').addEventListener('click', function(e){
    e.stopPropagation(); show(idx - 1);
  });
  document.getElementById('zcl-lb-next').addEventListener('click', function(e){
    e.stopPropagation(); show(idx + 1);
  });
  document.getElementById('zcl-moon-lb-close').addEventListener('click', function(e){
    e.stopPropagation(); close();
  });
  // Tap background to close (but not nav controls)
  document.getElementById('zcl-moon-lb').addEventListener('click', function(e){
    if(e.target === this) close();
  });
  // Keyboard arrows
  document.addEventListener('keydown', function(e){
    if(!document.getElementById('zcl-moon-lb').classList.contains('on')) return;
    if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') show(idx - 1);
    else if(e.key === 'ArrowRight' || e.key === 'ArrowDown') show(idx + 1);
    else if(e.key === 'Escape') close();
  });
})();
</script>

<script>
(function(){
  var modal=document.getElementById('zcl-set-modal');
  var frame=document.getElementById('zcl-set-frame');
  var backdrop=document.getElementById('zcl-set-backdrop');
  var gear=document.getElementById('pwa-night-btn')||document.getElementById('zcl-sf-nightbtn');
  var loaded=false;
  function open(){
    if(!loaded){ frame.src='settings.html?embed=1'; loaded=true }
    modal.classList.add('on');
  }
  function close(){ modal.classList.remove('on') }
  if(gear){
    gear.addEventListener('click', function(e){ e.preventDefault(); open() });
  }
  backdrop.addEventListener('click', close);
  // Messages from the settings iframe
  window.addEventListener('message', function(e){
    var d=e.data||{};
    if(d.type==='zcl-close'){ close() }
    else if(d.type==='zcl-night'){
      document.body.classList.toggle('night-mode', !!d.on);
      if(gear) gear.classList.toggle('on', !!d.on);
    }
    // zcl-fov: nothing to do live; finder re-reads sfVFOV on open
  });
})();
</script>


<script>
/* PWA install relay — beforeinstallprompt only fires on the top-level page, not
   inside the settings iframe, so we capture it here and bridge it to Settings. */
(function(){
  var deferred = null;
  function frameWin(){
    var f = document.getElementById('zcl-set-frame') || document.getElementById('es-set-frame');
    return f && f.contentWindow ? f.contentWindow : null;
  }
  function tellFrame(msg){ var w = frameWin(); if(w) w.postMessage(msg, '*') }
  window.addEventListener('beforeinstallprompt', function(ev){
    ev.preventDefault();
    deferred = ev;
    tellFrame({ type:'zcl-install-available' });
  });
  window.addEventListener('appinstalled', function(){
    deferred = null;
    tellFrame({ type:'zcl-installed' });
  });
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.type === 'zcl-do-install' && deferred){
      deferred.prompt();
      deferred.userChoice.finally(function(){ deferred = null });
    } else if(d.type === 'zcl-install-query'){
      tellFrame({ type: deferred ? 'zcl-install-available' : 'zcl-install-none' });
    }
  });
})();
</script>
