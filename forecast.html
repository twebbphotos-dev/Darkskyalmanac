function isoKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function within16(date){
  const diff=(date-new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()))/86400000;
  return diff>=0 && diff<16;
}

async function loadWeather(){
  try{
    const url='https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LNG
      +'&hourly=weather_code,temperature_2m,cloud_cover,precipitation_probability,wind_speed_10m,wind_direction_10m,dew_point_2m,relative_humidity_2m'
      +'&temperature_unit=fahrenheit&timezone=auto&forecast_days=16';
    const data=await (await fetch(url)).json();
    const H=data.hourly, bucket={};
    H.time.forEach((t,i)=>{
      const hr=+t.slice(11,13);
      if(hr<TOUR_START||hr>TOUR_END) return;
      const k=t.slice(0,10);
      (bucket[k]||(bucket[k]={temp:[],cloud:[],precip:[],wind:[],dir:[],dew:[],hum:[],code:null}));
      bucket[k].temp.push(H.temperature_2m[i]);
      bucket[k].cloud.push(H.cloud_cover[i]);
      bucket[k].precip.push(H.precipitation_probability[i]);
      bucket[k].wind.push(H.wind_speed_10m[i]);
      bucket[k].dir.push(H.wind_direction_10m[i]);
      bucket[k].dew.push(H.dew_point_2m[i]);
      bucket[k].hum.push(H.relative_humidity_2m[i]);
      if(hr===22) bucket[k].code=H.weather_code[i];
    });
    const avg=a=>Math.round(a.reduce((x,y)=>x+y,0)/a.length);
    for(const k in bucket){
      const b=bucket[k];
      wx[k]={code:b.code==null?0:b.code,temp:avg(b.temp),cloud:avg(b.cloud),
             precip:Math.max.apply(null,b.precip),wind:avg(b.wind),windDir:avg(b.dir),dew:avg(b.dew),hum:avg(b.hum)};
    }
  }catch(e){ /* leave wx empty; panel shows graceful fallback */ }
  wxLoaded=true;
  render();
  if(selKey){ const [Y,M,D]=selKey.split('-'); openDetail(new Date(+Y,+M-1,+D)) }
}

// ════════════════════════  8 · RENDER  ════════════════════════
const NOW=new Date();
let year=NOW.getFullYear(), month=NOW.getMonth(), selKey=null;

const $=id=>document.getElementById(id);

// background star field
(function(){
  let s='';
  for(let i=0;i<150;i++){
    s+=`<circle cx="${(Math.random()*800).toFixed(1)}" cy="${(Math.random()*700).toFixed(1)}" r="${(Math.random()*.9+.2).toFixed(2)}" fill="#fff" opacity="${(Math.random()*.6+.1).toFixed(2)}"/>`;
  }
  $('zcl-stars').innerHTML=s;
})();

// corner flourishes
(function(){
  const fl='<svg viewBox="0 0 40 40" fill="none" stroke="#CBA85A" stroke-width="1" stroke-linecap="round">'
    +'<path d="M2 2 L2 14" stroke-width="1.4"/><path d="M2 2 L14 2" stroke-width="1.4"/>'
    +'<path d="M2 7 C12 7 7 17 17 17" opacity=".9"/><path d="M7 2 C7 12 17 7 17 17" opacity=".9"/>'
    +'<path d="M2 19 C9 19 9 12 2 12" opacity=".55"/><path d="M19 2 C19 9 12 9 12 2" opacity=".55"/>'
    +'<circle cx="17" cy="17" r="1.5" fill="#E6CC85" stroke="none"/><circle cx="2.5" cy="2.5" r="1" fill="#E6CC85" stroke="none"/></svg>';
  document.querySelectorAll('.zcl-fl').forEach(el=>el.innerHTML=fl);
})();

function makeCell(date,outside){
  const {ill,waxing}=moonPhase(date);
  const el=document.createElement('div');
  el.className='zcl-dc'+(outside?' zcl-oc':'');
  const key=isoKey(date);
  el.setAttribute('data-key',key);
  if(!outside && key===isoKey(NOW)) el.className+=' zcl-today';
  if(!outside && key===selKey)      el.className+=' zcl-sel';
  el.innerHTML='<span class="zcl-dn">'+date.getDate()+'</span><div class="zcl-dm">'+cellIcon(date,38)+'</div>';
  if(!outside) el.addEventListener('click',()=>openDetail(date));
  return el;
}

function render(){
  $('zcl-mlabel').textContent=MO[month]+' '+year;
  const grid=$('zcl-grid'); grid.innerHTML='';
  const first=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  const prevDim=new Date(year,month,0).getDate();
  for(let i=first-1;i>=0;i--) grid.appendChild(makeCell(new Date(year,month-1,prevDim-i),true));
  for(let d=1;d<=dim;d++)     grid.appendChild(makeCell(new Date(year,month,d),false));
  const tail=Math.ceil((first+dim)/7)*7-first-dim;
  for(let d=1;d<=tail;d++)    grid.appendChild(makeCell(new Date(year,month+1,d),true));
}

// ════════════════════  9 · DETAIL PANEL  ════════════════════
function card(label,val,sub,cls){
  return '<div class="zcl-pcard'+(cls?' '+cls:'')+'">'
    +'<div class="zcl-pclabel">'+label+'</div>'
    +'<div class="zcl-pcval">'+val+'</div>'
    +(sub?'<div class="zcl-pcsub">'+sub+'</div>':'')+'</div>';
}

function openDetail(date,skipFade){
  const key=isoKey(date);
  selKey=key;
  document.querySelectorAll('.zcl-dc').forEach(c=>c.classList.remove('zcl-sel'));
  const cell=document.querySelector('.zcl-dc[data-key="'+key+'"]');
  if(cell && !cell.classList.contains('zcl-oc')) cell.classList.add('zcl-sel');

  const det=$('zcl-det');
  let html='';
  try{
    const mp=moonPhase(date);
    const w=wx[key];

    // header
    html+='<div class="zcl-dh"><div>'+moonSVG(mp.ill,mp.waxing,64)+'</div>'
      +'<div class="zcl-dmeta">'
      +'<div class="zcl-ddate">'+DY[date.getDay()]+', '+MO[date.getMonth()]+' '+date.getDate()+'</div>'
      +'<div class="zcl-dphase">'+mp.name+'</div>'
      +'<div class="zcl-dill">'+Math.round(mp.ill*100)+'% illuminated</div>'
      +'</div>'
      +'<div class="zcl-daynav zcl-daynav-top">'
      +  '<button class="zcl-daybtn" id="zcl-dayprev2" aria-label="Previous night">&#8249;</button>'
      +  '<button class="zcl-daybtn" id="zcl-daynext2" aria-label="Next night">&#8250;</button>'
      +'</div>'
      +'</div>';

    // badges
    const shower=meteorAlert(date), event=eventAlert(date);
    let badges='';
    if(shower){
      const heat=shower.zhr>=100?'#D4844A':shower.zhr>=50?'#C9A84C':'#9A7A38';
      const when=shower.atPeak?'● PEAK TONIGHT':'○ '+(shower.daysOff===1?'1 day':shower.daysOff+' days')+' from peak';
      badges+='<div class="zcl-badge" style="border-color:'+heat+'">'
        +'<span class="zcl-badge-t" style="color:'+heat+'">☄ '+shower.name.toUpperCase()+'</span>'
        +'<span class="zcl-badge-s">'+when+' · ZHR ~'+shower.zhr+' · '+shower.rad+'</span></div>';
    }
    if(event){
      const when=event.daysTo===0?'Tonight':event.daysTo>0?'in '+event.daysTo+' days':Math.abs(event.daysTo)+' days ago';
      badges+='<div class="zcl-badge">'
        +'<span class="zcl-badge-t" style="color:#CBA85A">♄ '+event.label.toUpperCase()+'</span>'
        +'<span class="zcl-badge-s">'+when+' · '+event.note+'</span></div>';
    }
    if(badges) html+=badges;

    // dew banner (only when within 4°F)
    if(w && (w.temp-w.dew)<4){
      html+='<div class="zcl-dewbanner">⚠ Dew risk — temp '+w.temp+'°F, dew point '+w.dew+'°F. Protect your optics tonight.</div>';
    }

    // weather — open by default
    html+='<div class="zcl-psec"><div class="zcl-psec-label">Weather · 9–11 PM</div><div class="zcl-psec-body">';
    if(w){
      html+='<div class="zcl-pcards cols2">'
        +card('Conditions',(WMO[w.code]||'Unknown'),w.temp+'°F')
        +card('Cloud Cover',w.cloud+'%')
        +card('Wind',w.wind+' mph',compass(w.windDir))
        +card('Humidity',w.hum+'%',w.hum>=80?'Hazy / dew likely':w.hum>=60?'Some haze possible':'Good transparency')
        +'</div>';
    }else{
      html+='<div class="zcl-pcard"><div class="zcl-nodata">'
        +(!wxLoaded&&within16(date)?'Loading forecast…':'Forecast available within 16 days')
        +'</div></div>';
    }
    html+='</div></div>';

    // sky window — collapsed by default
    const rs=moonRiseSet(date);
    const st=sunTimes(date);
    html+='<div class="zcl-psec collapsed"><div class="zcl-psec-label">Sky Window</div><div class="zcl-psec-body">'
      +'<div class="zcl-skywin">'
      +  '<div class="zcl-pcard accent"><div class="zcl-pclabel">True Dark Starts</div>'
      +    '<div class="zcl-pcval">'+trueDark(date)+'</div>'
      +    '<div class="zcl-pcsub">Astro twilight ends</div></div>'
      +  '<div class="zcl-skywin-times">'
      +    '<div class="zcl-pcard zcl-moonpair">'
      +      '<div class="zcl-pclabel">Sun Times</div>'
      +      '<div class="zcl-mtimes">'
      +        '<div class="zcl-mtime"><span class="zcl-mtico">&#x2198;</span><div><div class="zcl-mtlabel">Sunset</div><div class="zcl-mtval">'+st.sunset+'</div></div></div>'
      +        '<div class="zcl-mtdiv"></div>'
      +        '<div class="zcl-mtime"><span class="zcl-mtico">&#x2197;</span><div><div class="zcl-mtlabel">Sunrise</div><div class="zcl-mtval">'+st.sunrise+'</div></div></div>'
      +      '</div>'
      +    '</div>'
      +    '<div class="zcl-pcard zcl-moonpair">'
      +      '<div class="zcl-pclabel">Moon Times</div>'
      +      '<div class="zcl-mtimes">'
      +        '<div class="zcl-mtime"><span class="zcl-mtico">&#x2197;</span><div><div class="zcl-mtlabel">Rise</div><div class="zcl-mtval">'+rs.rise+'</div></div></div>'
      +        '<div class="zcl-mtdiv"></div>'
      +        '<div class="zcl-mtime"><span class="zcl-mtico">&#x2198;</span><div><div class="zcl-mtlabel">Set</div><div class="zcl-mtval">'+rs.set+'</div></div></div>'
      +      '</div>'
      +    '</div>'
      +  '</div>'
      +'</div></div></div>';

    // milky way — collapsed by default
    const mw=milkyWay(date);
    html+='<div class="zcl-psec collapsed"><div class="zcl-psec-label">Milky Way Core</div><div class="zcl-psec-body">';
    if(!mw){
      html+='<div class="zcl-pcard"><div class="zcl-nodata">Below 10° all night — not a core night.</div></div>';
    }else{
      const riseCard = mw.riseStr
        ? card('Rises above 5°',mw.riseStr,'','accent')
        : card('Rises above 5°','By dusk','Already up at 10 PM','accent');
      html+='<div class="zcl-pcards cols2">'+riseCard+card('Peaks (Transit)',mw.transit,'')+'</div>';
      const lab=mw.alts.map((a,i)=>['9 PM','10 PM','11 PM'][i]+': '+(a<0?'below '+Math.abs(a):'+'+a)+'°').join('  ·  ');
      html+='<div class="zcl-altrow">'+lab+'</div>';
    }
    html+='</div></div>';

    // ── day stepper + tonight's target ──────────────────────────
    html+='<div class="zcl-daynav">'
      +'<button class="zcl-daybtn" id="zcl-dayprev" aria-label="Previous night">&#8249;</button>'
      +'<span class="zcl-daynav-label">Browse nights</span>'
      +'<button class="zcl-daybtn" id="zcl-daynext" aria-label="Next night">&#8250;</button>'
      +'</div>';

    // tonight's target — open by default
    {
      const tg=pickTarget(date);
      const isLunar = tg.kind==='Lunar Feature';
      const cue   = isLunar ? '\u263D ' : '';
      const inner = isLunar ? 'Lunar Feature on the Terminator' : 'Deep-Sky Object';
      const lunarLink = isLunar
        ? '<div style="margin-top:11px"><a href="moon" style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#CBA85A;text-decoration:none;border:1px solid rgba(203,168,90,.4);border-radius:4px;padding:6px 10px;display:inline-flex;align-items:center;gap:6px">\u263D Explore in the Lunar Atlas <span style="font-size:14px;line-height:1">\u203A</span></a></div>'
        : '';
      const findBlock = tg.find
        ? '<div class="zcl-find"><div class="zcl-find-head">'
          +'<svg viewBox="0 0 16 16" fill="none">'
          +'<circle cx="6.6" cy="6.6" r="4.6" fill="rgba(125,150,180,0.16)" stroke="#CBA85A" stroke-width="1.4"/>'
          +'<line x1="10.1" y1="10.1" x2="14" y2="14" stroke="#B5933F" stroke-width="1.6" stroke-linecap="round"/>'
          +'</svg>How to find it</div>'
          +'<div class="zcl-find-body">'+tg.find+'</div></div>'
        : '';
      html+='<div class="zcl-psec collapsed"><div class="zcl-psec-label">Tonight\u2019s Target</div><div class="zcl-psec-body">'
        +'<div class="zcl-pcard accent"><div class="zcl-pclabel">'+inner+'</div>'
        +'<div class="zcl-pcval" style="color:#CBA85A;font-size:16px;margin-bottom:2px">'+cue+tg.primary+'</div>'
        +(tg.why?'<div class="zcl-tgtwhy">'+tg.why+'</div>':'')
        +findBlock
        +lunarLink
        +'<div class="zcl-tgtsec">'+tg.secondary+'</div></div></div></div>';
    }

    // ── planets — collapsed by default ─────────────────────────
    html += planetPanel(date);

  }catch(err){
    const mp=moonPhase(date);
    html='<div class="zcl-dh"><div>'+moonSVG(mp.ill,mp.waxing,64)+'</div><div class="zcl-dmeta">'
      +'<div class="zcl-ddate">'+DY[date.getDay()]+', '+MO[date.getMonth()]+' '+date.getDate()+'</div>'
      +'<div class="zcl-dphase">'+mp.name+'</div>'
      +'<div class="zcl-dill">'+Math.round(mp.ill*100)+'% illuminated</div></div></div>'
      +'<div class="zcl-trec good"><span class="zcl-trec-icon">☾</span><span>Detailed forecast unavailable for this date.</span></div>';
  }

  det.innerHTML=html;

  // Accordion: tap any section label to expand/collapse.
  det.querySelectorAll('.zcl-psec-label').forEach(lbl=>{
    lbl.addEventListener('click', e=>{
      // Don't toggle if click was on a link inside the label (shouldn't happen but safe).
      if(e.target.closest('a')) return;
      lbl.closest('.zcl-psec').classList.toggle('collapsed');
    });
  });

  if(!skipFade){
    det.classList.remove('zcl-open');
    void det.offsetWidth;          // restart the fade animation
    det.classList.add('zcl-open');
  }else{
    det.classList.add('zcl-open'); // no flash while rapidly stepping days
  }

  // wire up the prev/next-day arrows (panel is rebuilt each open, so bind here)
  bindDayBtn('zcl-dayprev', -1);
  bindDayBtn('zcl-daynext',  1);
  bindDayBtn('zcl-dayprev2',-1);
  bindDayBtn('zcl-daynext2', 1);
}

// The date currently shown in the panel (derived from selKey).
function currentDate(){
  if(!selKey) return new Date(NOW);
  const [Y,M,D]=selKey.split('-'); return new Date(+Y,+M-1,+D);
}

// Bind a day-step button: single click steps once; press-and-hold auto-advances.
let _holdTimer=null, _holdInterval=null;
function bindDayBtn(id, delta){
  const b=$(id); if(!b) return;
  b.addEventListener('click',()=>stepDay(currentDate(),delta,id));
  // press-and-hold (mouse + touch)
  const start=(e)=>{
    // ignore the synthetic click that follows; we handle stepping here on hold
    clearHold();
    _holdTimer=setTimeout(()=>{
      _holdInterval=setInterval(()=>stepDay(currentDate(),delta,id), 130);
    }, 380);                         // hold ~0.4s before auto-advance kicks in
  };
  b.addEventListener('mousedown',start);
  b.addEventListener('touchstart',start,{passive:true});
}
function clearHold(){
  if(_holdTimer){ clearTimeout(_holdTimer); _holdTimer=null }
  if(_holdInterval){ clearInterval(_holdInterval); _holdInterval=null }
}

// Move to the adjacent night; flip the calendar to that month if needed.
// Keeps the clicked arrow under the cursor by preserving scroll position.
function stepDay(fromDate,delta,btnId){
  const btn = btnId ? $(btnId) : null;
  const beforeY = btn ? btn.getBoundingClientRect().top : null;
  const d=new Date(fromDate.getFullYear(),fromDate.getMonth(),fromDate.getDate()+delta);
  if(d.getMonth()!==month||d.getFullYear()!==year){
    month=d.getMonth(); year=d.getFullYear(); render();
  }
  openDetail(d, true);   // skip fade for snappy repeat-clicks
  // restore the button to the same screen position so the cursor stays on it
  if(btn!==null && beforeY!==null){
    const newBtn=$(btnId);
    if(newBtn){
      const afterY=newBtn.getBoundingClientRect().top;
      const dy=afterY-beforeY;
      if(dy) window.scrollBy(0,dy);
    }
  }
}

// ════════════════════════  10 · INIT  ════════════════════════
$('zcl-prev').addEventListener('click',()=>{ month--; if(month<0){month=11;year--} render() });
$('zcl-next').addEventListener('click',()=>{ month++; if(month>11){month=0;year++} render() });

// Stop any press-and-hold auto-advance when the press ends anywhere.
['mouseup','touchend','touchcancel','mouseleave','blur'].forEach(ev=>
  window.addEventListener(ev, clearHold));

// Left/Right arrow keys step the day when the calendar has been interacted with.
let _keyNavArmed=false;
document.addEventListener('keydown',(e)=>{
  // only hijack arrows once a day is open and the user isn't typing in the ZIP box
  if(!selKey) return;
  const ae=document.activeElement;
  if(ae && (ae.id==='zcl-zip' || ae.tagName==='INPUT')) return;
  if(e.key==='ArrowRight'){ e.preventDefault(); stepDay(currentDate(),1,null) }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); stepDay(currentDate(),-1,null) }
});

// ---- Location chooser (ZIP → lat/lng via Zippopotam.us, no key) ----
function updateLocHeader(){
  const hemi = LAT>=0 ? 'N' : 'S';
  $('zcl-loc').innerHTML = PLACE+' · '+Math.abs(LAT).toFixed(2)+'\u00B0 '+hemi
    +' <span class="zcl-locedit">change</span>';
  bindLocEdit();
}
function bindLocEdit(){
  const e=document.querySelector('#zcl-loc .zcl-locedit');
  if(e) e.addEventListener('click',()=>{ $('zcl-locform').classList.toggle('open'); $('zcl-zip').focus() });
}
function applyLocation(lat,lng,place,tz){
  LAT=lat; LNG=lng; PLACE=place; if(tz) TZ=tz;
  // clear cached weather (it was for the old place) and refetch
  for(const k in wx) delete wx[k];
  wxLoaded=false;
  updateLocHeader();
  render();
  if(selKey){ const [Y,M,D]=selKey.split('-'); openDetail(new Date(+Y,+M-1,+D)) }
  else openDetail(NOW);
  loadWeather();
}
async function lookupZip(){
  const zip=($('zcl-zip').value||'').trim();
  const msg=$('zcl-zipmsg');
  if(!/^\d{5}$/.test(zip)){ msg.textContent='Enter a 5-digit ZIP'; return }
  msg.textContent='Looking up…';
  try{
    const r=await fetch('https://api.zippopotam.us/us/'+zip);
    if(!r.ok) throw new Error('not found');
    const d=await r.json();
    const p=d.places[0];
    const lat=parseFloat(p.latitude), lng=parseFloat(p.longitude);
    const place=p['place name']+', '+p['state abbreviation'];
    // resolve a timezone from the browser via the coordinates is non-trivial;
    // Open-Meteo's timezone=auto handles weather, and sky math is UTC-based,
    // so we approximate the display TZ from longitude for label purposes.
    msg.textContent='';
    $('zcl-locform').classList.remove('open');
    applyLocation(lat,lng,place,guessTZ(lng));
  }catch(e){
    msg.textContent='ZIP not found — try another';
  }
}
// Rough US timezone from longitude (display/labels; weather uses timezone=auto)
function guessTZ(lng){
  if(lng>=-67.5) return 'America/Halifax';
  if(lng>=-82.5) return 'America/New_York';
  if(lng>=-97.5) return 'America/Chicago';
  if(lng>=-112.5) return 'America/Denver';
  if(lng>=-127.5) return 'America/Los_Angeles';
  if(lng>=-142.5) return 'America/Anchorage';
  return 'Pacific/Honolulu';
}
$('zcl-zipgo').addEventListener('click',lookupZip);
$('zcl-zip').addEventListener('keydown',e=>{ if(e.key==='Enter') lookupZip() });
$('zcl-zipreset').addEventListener('click',()=>{
  $('zcl-zipmsg').textContent='';
  $('zcl-locform').classList.remove('open');
  applyLocation(37.1986,-112.9869,'Zion National Park','America/Denver');
});
bindLocEdit();

render();
openDetail(NOW);
loadWeather();

})();
</script>

<style>
#zcl-set-modal{position:fixed;inset:0;z-index:10050;display:none;
  align-items:center;justify-content:center;padding:env(safe-area-inset-top) 16px 16px}
#zcl-set-modal.on{display:flex}
#zcl-set-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#zcl-set-sheet{position:relative;width:100%;max-width:520px;max-height:88vh;
  background:#141319;border:1px solid rgba(203,168,90,.4);border-radius:14px;
  box-shadow:0 16px 50px rgba(0,0,0,.6);overflow:hidden;
  animation:zcl-set-pop .2s ease}
@keyframes zcl-set-pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
#zcl-set-frame{width:100%;height:78vh;max-height:620px;border:0;display:block;background:#141319}
</style>
<div id="zcl-set-modal">
  <div id="zcl-set-backdrop"></div>
  <div id="zcl-set-sheet"><iframe id="zcl-set-frame" title="Settings"></iframe></div>
</div>
<script>
(function(){
  var modal=document.getElementById('zcl-set-modal');
  var frame=document.getElementById('zcl-set-frame');
  var backdrop=document.getElementById('zcl-set-backdrop');
  var gear=document.getElementById('pwa-night-btn')||document.getElementById('zcl-sf-nightbtn');
  var loaded=false;
  function open(){
    if(!loaded){ frame.src='settings.html?embed=1'; loaded=true }
    modal.classList.add('on');
  }
  function close(){ modal.classList.remove('on') }
  if(gear){
    gear.addEventListener('click', function(e){ e.preventDefault(); open() });
  }
  backdrop.addEventListener('click', close);
  // Messages from the settings iframe
  window.addEventListener('message', function(e){
    var d=e.data||{};
    if(d.type==='zcl-close'){ close() }
    else if(d.type==='zcl-night'){
      document.body.classList.toggle('night-mode', !!d.on);
      if(gear) gear.classList.toggle('on', !!d.on);
    }
    // zcl-fov: nothing to do live; finder re-reads sfVFOV on open
  });
})();
</script>


<script>
/* PWA install relay — beforeinstallprompt only fires on the top-level page, not
   inside the settings iframe, so we capture it here and bridge it to Settings. */
(function(){
  var deferred = null;
  function frameWin(){
    var f = document.getElementById('zcl-set-frame') || document.getElementById('es-set-frame');
    return f && f.contentWindow ? f.contentWindow : null;
  }
  function tellFrame(msg){ var w = frameWin(); if(w) w.postMessage(msg, '*') }
  window.addEventListener('beforeinstallprompt', function(ev){
    ev.preventDefault();
    deferred = ev;
    tellFrame({ type:'zcl-install-available' });
  });
  window.addEventListener('appinstalled', function(){
    deferred = null;
    tellFrame({ type:'zcl-installed' });
  });
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.type === 'zcl-do-install' && deferred){
      deferred.prompt();
      deferred.userChoice.finally(function(){ deferred = null });
    } else if(d.type === 'zcl-install-query'){
      tellFrame({ type: deferred ? 'zcl-install-available' : 'zcl-install-none' });
    }
  });
})();
</script>
